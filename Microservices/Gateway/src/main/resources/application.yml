server.port: 9999

#----------------------------------------

spring:

  application.name: gateway  # Nome do microservico

  cloud:

    gateway.server.webflux:
      routes:

        - id: delivery-tracking-route
          uri: lb://delivery-tracking     # Encaminha requisicoes para o microservico/projeto "delivery-tracking" usando Load Balancer + Eureka (sem precisar informar IP/porta).
          predicates:
            - Path=/api/v1/deliveries/**
            - Method=GET,POST,PUT,DELETE,OPTIONS

        - id: courier-management-route
          uri: lb://courier-management    # Encaminha requisicoes para o microservico "courier-management" usando Load Balancer + Eureka (sem precisar informar IP/porta).
          predicates:
            - Path=/api/v1/couriers/**
            - Method=GET,POST,PUT,DELETE,OPTIONS

#----------------------------------------

eureka:                                             # Configuracoes do Eureka.

  client:                                           # Configuracoes do cliente Eureka.
    register-with-eureka: false                     # Impede que esse projeto se registre no Eureka como microservico.
    fetch-registry: true                            # Permite que o Gateway busque no Eureka a lista de microserviços disponiveis.

    service-url:                                    # Configuracao da URL do servidor Eureka.
      default-zone: http://localhost:8761/eureka/   # Endereco do servidor Eureka usado pelo Gateway para descobrir microservicos.